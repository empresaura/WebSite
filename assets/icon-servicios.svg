<!-- icon-servicios.svg -->
<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="goldGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8C08A"/>
      <stop offset="1" stop-color="#B9975B"/>
    </linearGradient>
  </defs>

  <!-- Central person -->
  <circle
    cx="32"
    cy="21"
    r="7"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
  />

  <path
    d="M20 50V44C20 37.4 25.4 32 32 32C38.6 32 44 37.4 44 44V50"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Left support person -->
  <circle
    cx="16"
    cy="27"
    r="5"
    stroke="url(#goldGradient)"
    stroke-width="2.2"
  />

  <path
    d="M8 50V46C8 41.6 11.6 38 16 38"
    stroke="url(#goldGradient)"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- Right support person -->
  <circle
    cx="48"
    cy="27"
    r="5"
    stroke="url(#goldGradient)"
    stroke-width="2.2"
  />

  <path
    d="M56 50V46C56 41.6 52.4 38 48 38"
    stroke="url(#goldGradient)"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- Ground/value line -->
  <path
    d="M14 54H50"
    stroke="url(#goldGradient)"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.75"
  />
</svg>