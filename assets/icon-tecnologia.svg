<!-- icon-tecnologia.svg -->
<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="goldGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8C08A"/>
      <stop offset="1" stop-color="#B9975B"/>
    </linearGradient>
  </defs>

  <!-- Screen -->
  <rect
    x="10"
    y="14"
    width="44"
    height="32"
    rx="4"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
  />

  <!-- Growth / analytics line -->
  <path
    d="M18 36L27 28L34 33L46 22"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Data points -->
  <circle cx="18" cy="36" r="2" fill="url(#goldGradient)" />
  <circle cx="27" cy="28" r="2" fill="url(#goldGradient)" />
  <circle cx="34" cy="33" r="2" fill="url(#goldGradient)" />
  <circle cx="46" cy="22" r="2" fill="url(#goldGradient)" />

  <!-- Stand -->
  <path
    d="M26 46V52"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <path
    d="M38 46V52"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <path
    d="M22 52H42"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
  />
</svg>