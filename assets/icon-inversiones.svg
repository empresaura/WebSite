<!-- icon-inversiones.svg -->
<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="goldGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8C08A"/>
      <stop offset="1" stop-color="#B9975B"/>
    </linearGradient>
  </defs>

  <!-- Base line -->
  <path
    d="M10 52H54"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <!-- Bars -->
  <path d="M16 52V39" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 52V31" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M40 52V22" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Growth line -->
  <path
    d="M12 34L24 27L33 31L50 14"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Arrow -->
  <path
    d="M43 14H50V21"
    stroke="url(#goldGradient)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>